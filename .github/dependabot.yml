version: 2

# Dependency update PRs are disabled here (open-pull-requests-limit: 0).
# Security advisory PRs are NOT affected by this limit and will still be created
# automatically when a vulnerability is detected.
# To re-enable routine version-bump PRs, raise the limit on a specific ecosystem.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - frontend

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - rust

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - ci
