name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Please fill out the form below so we can reproduce and fix it quickly.
  - type: input
    id: version
    attributes:
      label: Kafka Desktop Manager version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 10 / 11
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: kafka
    attributes:
      label: Apache Kafka version
      placeholder: e.g. 3.7.0 / MSK / Confluent Cloud
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Attach logs or screenshots if applicable.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and this has not been reported.
          required: true
        - label: I am using the latest released version.
          required: true
